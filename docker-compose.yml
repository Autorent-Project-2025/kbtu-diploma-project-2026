  api-gateway:
    build:
      context: ./backend/external/reverse-proxy-service/src
      dockerfile: ./Dockerfile
    restart: unless-stopped
    environment:
      IDENTITY_SERVICE_URL: http://identity-service:8080
      CAR_SERVICE_URL: http://car-service:8080
      BOOKING_SERVICE_URL: http://booking-service:8080
      CLIENT_SERVICE_URL: http://client-service:8080
      PARTNER_SERVICE_URL: http://partner-service:8080
      TICKET_SERVICE_URL: http://ticket-service:8080
      FILE_SERVICE_URL: http://file-service:8080
      INTERNAL_SERVICE_URL: http://image-service:8080
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:5175
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 300
      PROXY_TIMEOUT_MS: 30000
      REQUEST_TIMEOUT_MS: 30000
      PORT: 8080
      HTTPS_PORT: 8443
      TLS_ENABLED: "true"
      HTTP_TO_HTTPS_REDIRECT: "false"
      TLS_CERT_PATH: /tmp/autorent-edge.crt
      TLS_KEY_PATH: /tmp/autorent-edge.key
      TLS_CERT_CN: localhost
      TLS_CERT_DAYS: 30
      TRUST_PROXY: loopback, linklocal, uniquelocal
      OTEL_SERVICE_NAME: api-gateway
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      OBSERVABILITY_LOG_PATH: /tmp/autorent/api-gateway/api-gateway.jsonl
    ports:
      - "${API_GATEWAY_PORT:-9186}:8080"
      - "${API_GATEWAY_TLS_PORT:-9443}:8443"
    depends_on:
      identity-service:
        condition: service_healthy
      car-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      client-service:
        condition: service_healthy
      partner-service:
        condition: service_healthy
      ticket-service:
        condition: service_healthy
      file-service:
        condition: service_healthy
      image-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/healthz').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - frontend
      - backend
    volumes:
      - gateway_logs:/tmp/autorent/api-gateway

  frontend:
    build:
      context: ./frontend/external
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./frontend/external/.env.example
        required: true
      - path: ./frontend/external/.env
        required: false
    command: npm run dev -- --host
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - frontend

  internal-frontend:
    build:
      context: ./frontend/internal
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./frontend/internal/.env.example
        required: true
      - path: ./frontend/internal/.env
        required: false
    command: npm run dev -- --host
    ports:
      - "${INTERNAL_FRONTEND_PORT:-5174}:5173"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - frontend

  superadmin-frontend:
    build:
      context: ./frontend/superadmin
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./frontend/superadmin/.env.example
        required: true
      - path: ./frontend/superadmin/.env
        required: false
    command: npm run dev -- --host
    ports:
      - "${SUPERADMIN_FRONTEND_PORT:-5175}:5173"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - frontend

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./ops/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - backend

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/config.yml
    volumes:
      - ./ops/observability/otel-collector/config.yml:/etc/otelcol-contrib/config.yml:ro
    expose:
      - "4317"
      - "4318"
      - "13133"
    networks:
      - backend

  tempo:
    image: grafana/tempo:2.3.1
    restart: unless-stopped
    user: "0"
    command:
      - -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./ops/observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "${TEMPO_PORT:-3200}:3200"
    networks:
      - backend

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yml
    volumes:
      - ./ops/observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    networks:
      - backend

  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    command:
      - -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki
    volumes:
      - ./ops/observability/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - gateway_logs:/tmp/autorent/api-gateway:ro
      - ticket_logs:/tmp/autorent/ticket-service:ro
      - identity_logs:/tmp/autorent/identity-service:ro
      - email_logs:/tmp/autorent/email-service:ro
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/autorent-observability.json
    volumes:
      - ./ops/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - backend

volumes:
  rabbitmq_data:
  identity_pgdata:
  car_pgdata:
  booking_pgdata:
  client_pgdata:
  partner_pgdata:
  payment_pgdata:
  ticket_pgdata:
  image_uploads:
  file_uploads:
  grafana_data:
  tempo_data:
  loki_data:
  gateway_logs:
  ticket_logs:
  identity_logs:
  email_logs:

networks:
  frontend:
  backend:
  data:
    internal: true
