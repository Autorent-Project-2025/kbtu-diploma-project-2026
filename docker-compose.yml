      ConnectionStrings__DbConnection: Host=car-db;Port=5432;Database=postgres_db;Username=postgres;Password=postgres
      PartnerService__BaseUrl: http://partner-service:8080
      BookingService__BaseUrl: http://booking-service:8080
      BookingService__InternalApiKey: local-booking-service-key
      ImageService__BaseUrl: http://image-service:8080
      InternalAuth__ApiKey: local-car-service-key
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: ${RABBITMQ_DEFAULT_USER:-autorent}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-autorent}
      RabbitMq__ExchangeName: ${RABBITMQ_EXCHANGE_NAME:-autorent.events}
    expose:
