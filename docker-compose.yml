      context: ./backend/shared/image-service/src
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./backend/shared/image-service/.env.example
        required: true
      - path: ./backend/shared/image-service/.env
        required: false
    environment:
      PORT: 8080
      PUBLIC_BASE_URL: ${IMAGE_SERVICE_PUBLIC_BASE_URL:-http://localhost:9186/internal}
    expose:
      - "8080"
    volumes:
      - image_uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/healthz').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - backend

