  email-service:
    build:
      context: ./backend/shared/email-service/src
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./backend/shared/email-service/.env.example
        required: true
      - path: ./backend/shared/email-service/.env
        required: false
    environment:
      PORT: 8080
    expose:
      - "8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/healthz').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - backend

  ticket-service:
    build:
      context: ./backend/internal/ticket-service/src
      dockerfile: ./TicketService.Api/Dockerfile
    restart: unless-stopped
