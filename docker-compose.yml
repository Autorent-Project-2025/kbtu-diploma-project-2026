      context: ./backend/shared/email-service/src
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./backend/shared/email-service/.env.example
        required: true
      - path: ./backend/shared/email-service/.env
        required: false
    environment:
      PORT: 8080
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-autorent}:${RABBITMQ_DEFAULT_PASS:-autorent}@rabbitmq:5672
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE_NAME:-autorent.events}
      OBSERVABILITY_LOG_PATH: /tmp/autorent/email-service/email-service.jsonl
    expose:
      - "8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/healthz').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - backend
    volumes:
      - email_logs:/tmp/autorent/email-service

