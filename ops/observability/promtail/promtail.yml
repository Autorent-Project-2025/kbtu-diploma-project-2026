server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets:
          - localhost
        labels:
          job: api-gateway
          service_name: api-gateway
          __path__: /tmp/autorent/api-gateway/*.jsonl
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            service: service
            event: event
            method: method
            route: route
            statusCode: statusCode
      - timestamp:
          source: timestamp
          format: RFC3339
      - labels:
          service:
          event:
          method:
          route:
          statusCode:

  - job_name: ticket-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: ticket-service
          service_name: ticket-service
          __path__: /tmp/autorent/ticket-service/*.jsonl
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            service: service
            event: event
            method: method
            route: route
            statusCode: statusCode
            target: target
            outcome: outcome
      - timestamp:
          source: timestamp
          format: RFC3339
      - labels:
          service:
          event:
          method:
          route:
          statusCode:
          target:
          outcome:

  - job_name: identity-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: identity-service
          service_name: identity-service
          __path__: /tmp/autorent/identity-service/*.jsonl
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            service: service
            event: event
            method: method
            route: route
            statusCode: statusCode
      - timestamp:
          source: timestamp
          format: RFC3339
      - labels:
          service:
          event:
          method:
          route:
          statusCode:
