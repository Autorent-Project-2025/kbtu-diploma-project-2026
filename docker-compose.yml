    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DbConnection: Host=payment-db;Port=5432;Database=postgres_db;Username=postgres;Password=postgres
      InternalAuth__ApiKey: local-payment-service-key
      Payment__Currency: KZT
      Payment__PlatformCommissionRate: 0.10
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: ${RABBITMQ_DEFAULT_USER:-autorent}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-autorent}
