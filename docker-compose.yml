      - path: ./backend/internal/ticket-service/.env.example
        required: true
      - path: ./backend/internal/ticket-service/.env
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DbConnection: Host=ticket-db;Port=5432;Database=postgres_db;Username=postgres;Password=postgres
      IdentityService__BaseUrl: http://identity-service:8080
      IdentityService__InternalApiKey: local-identity-service-key
      EmailService__BaseUrl: http://email-service:8080
      ClientService__BaseUrl: http://client-service:8080
      ClientService__InternalApiKey: local-client-service-key
      PartnerService__BaseUrl: http://partner-service:8080
      PartnerService__InternalApiKey: local-partner-service-key
      FileService__BaseUrl: http://file-service:8080
      FileService__InternalApiKey: local-file-service-key
      ImageService__BaseUrl: http://image-service:8080
      CarService__BaseUrl: http://car-service:8080
      CarService__InternalApiKey: local-car-service-key
    expose:
      - "8080"
    depends_on:
      ticket-db:
        condition: service_healthy
      ticket-flyway:
        condition: service_completed_successfully
      identity-service:
        condition: service_healthy
      email-service:
        condition: service_healthy
      client-service:
        condition: service_healthy
      partner-service:
        condition: service_healthy
      file-service:
        condition: service_healthy
      image-service:
        condition: service_healthy
      car-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend
      - data

  image-service:
