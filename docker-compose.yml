services:
  identity-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres_db
    ports:
      - "${IDENTITY_DB_PORT:-5434}:5432"
    volumes:
      - identity_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres_db"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  identity-flyway:
    image: flyway/flyway:12
    restart: "no"
    depends_on:
      identity-db:
        condition: service_healthy
    command: migrate
    volumes:
      - ./backend/shared/identity-service/src/Migrations:/flyway/sql:ro
    environment:
      FLYWAY_URL: jdbc:postgresql://identity-db:5432/postgres_db
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres
      FLYWAY_CONNECT_RETRIES: 30

  identity-service:
    build:
      context: ./backend/shared/identity-service/src
      dockerfile: ./IdentityService.Api/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./backend/shared/identity-service/.env.example
        required: true
      - path: ./backend/shared/identity-service/.env
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DbConnection: Host=identity-db;Port=5432;Database=postgres_db;Username=postgres;Password=postgres
    ports:
      - "${IDENTITY_SERVICE_PORT:-1244}:8080"
    depends_on:
      identity-db:
        condition: service_healthy
      identity-flyway:
        condition: service_completed_successfully

  car-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres_db
    ports:
      - "${CAR_DB_PORT:-1299}:5432"
    volumes:
      - car_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres_db"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  car-flyway:
    image: flyway/flyway:12
    restart: "no"
    depends_on:
      car-db:
        condition: service_healthy
    command: migrate
    volumes:
      - ./backend/external/car-service/src/Migrations:/flyway/sql:ro
    environment:
      FLYWAY_URL: jdbc:postgresql://car-db:5432/postgres_db
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres
      FLYWAY_CONNECT_RETRIES: 30

  car-service:
    build:
      context: ./backend/external/car-service/src
      dockerfile: ./CarService.Api/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./backend/external/car-service/.env.example
        required: true
      - path: ./backend/external/car-service/.env
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DbConnection: Host=car-db;Port=5432;Database=postgres_db;Username=postgres;Password=postgres
    ports:
      - "${CAR_SERVICE_PORT:-1298}:8080"
    depends_on:
      car-db:
        condition: service_healthy
      car-flyway:
        condition: service_completed_successfully

  booking-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
