    environment:
      FLYWAY_URL: jdbc:postgresql://booking-db:5432/postgres_db
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres
      FLYWAY_CONNECT_RETRIES: 30

  booking-service:
    build:
      context: ./backend/external/booking-service/src
      dockerfile: ./BookingService.Api/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./backend/external/booking-service/.env.example
        required: true
      - path: ./backend/external/booking-service/.env
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DbConnection: Host=booking-db;Port=5432;Database=postgres_db;Username=postgres;Password=postgres
    ports:
      - "${BOOKING_SERVICE_PORT:-1821}:8080"
    depends_on:
      booking-db:
        condition: service_healthy
      booking-flyway:
        condition: service_completed_successfully

  client-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres_db
    ports:
      - "${CLIENT_DB_PORT:-1291}:5432"
    volumes:
      - client_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres_db"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  client-flyway:
    image: flyway/flyway:12
    restart: "no"
    depends_on:
      client-db:
        condition: service_healthy
    command: migrate
    volumes:
      - ./backend/external/client-service/src/Migrations:/flyway/sql:ro
    environment:
      FLYWAY_URL: jdbc:postgresql://client-db:5432/postgres_db
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres
      FLYWAY_CONNECT_RETRIES: 30

  client-service:
    build:
      context: ./backend/external/client-service/src
      dockerfile: ./ClientService.Api/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./backend/external/client-service/.env.example
        required: true
      - path: ./backend/external/client-service/.env
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DbConnection: Host=client-db;Port=5432;Database=postgres_db;Username=postgres;Password=postgres
    ports:
      - "${CLIENT_SERVICE_PORT:-1831}:8080"
    depends_on:
      client-db:
        condition: service_healthy
      client-flyway:
        condition: service_completed_successfully

  ticket-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres_db
    ports:
      - "${TICKET_DB_PORT:-1290}:5432"
    volumes:
      - ticket_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres_db"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  ticket-flyway:
    image: flyway/flyway:12
    restart: "no"
    depends_on:
      ticket-db:
        condition: service_healthy
    command: migrate
    volumes:
      - ./backend/internal/ticket-service/src/Migrations:/flyway/sql:ro
    environment:
      FLYWAY_URL: jdbc:postgresql://ticket-db:5432/postgres_db
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres
      FLYWAY_CONNECT_RETRIES: 30

  email-service:
    build:
      context: ./backend/shared/email-service/src
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./backend/shared/email-service/.env.example
        required: true
      - path: ./backend/shared/email-service/.env
        required: false
    environment:
      PORT: 8080
    ports:
      - "${EMAIL_SERVICE_PORT:-9182}:8080"

  ticket-service:
    build:
      context: ./backend/internal/ticket-service/src
      dockerfile: ./TicketService.Api/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./backend/internal/ticket-service/.env.example
        required: true
      - path: ./backend/internal/ticket-service/.env
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DbConnection: Host=ticket-db;Port=5432;Database=postgres_db;Username=postgres;Password=postgres
      IdentityService__BaseUrl: http://identity-service:8080
      EmailService__BaseUrl: http://email-service:8080
      ClientService__BaseUrl: http://client-service:8080
      ClientService__InternalApiKey: local-internal-api-key
      FileService__BaseUrl: http://file-service:8080
      FileService__InternalApiKey: local-internal-api-key
    ports:
      - "${TICKET_SERVICE_PORT:-1248}:8080"
    depends_on:
      ticket-db:
        condition: service_healthy
      ticket-flyway:
        condition: service_completed_successfully
      identity-service:
        condition: service_started
      email-service:
        condition: service_started
      client-service:
        condition: service_started
      file-service:
        condition: service_started

  image-service:
    build:
      context: ./backend/shared/image-service/src
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./backend/shared/image-service/.env.example
        required: true
      - path: ./backend/shared/image-service/.env
        required: false
    environment:
      PORT: 8080
    ports:
      - "${IMAGE_SERVICE_PORT:-9181}:8080"
    volumes:
      - image_uploads:/app/uploads

  file-service:
    build:
      context: ./backend/internal/file-service/src
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./backend/internal/file-service/.env.example
        required: true
      - path: ./backend/internal/file-service/.env
        required: false
    environment:
      PORT: 8080
      INTERNAL_API_KEY: local-internal-api-key
    ports:
      - "${FILE_SERVICE_PORT:-9183}:8080"
    volumes:
      - file_uploads:/app/uploads

  api-gateway:
    build:
      context: ./backend/external/reverse-proxy-service/src
      dockerfile: ./Dockerfile
    restart: unless-stopped
    environment:
      IDENTITY_SERVICE_URL: http://identity-service:8080
      CAR_SERVICE_URL: http://car-service:8080
      BOOKING_SERVICE_URL: http://booking-service:8080
      CLIENT_SERVICE_URL: http://client-service:8080
      TICKET_SERVICE_URL: http://ticket-service:8080
      FILE_SERVICE_URL: http://file-service:8080
      INTERNAL_SERVICE_URL: http://image-service:8080
      PORT: 8080
    ports:
      - "${API_GATEWAY_PORT:-9186}:8080"
    depends_on:
      identity-service:
        condition: service_started
      car-service:
        condition: service_started
      booking-service:
        condition: service_started
      client-service:
        condition: service_started
      ticket-service:
        condition: service_started
      file-service:
        condition: service_started
      image-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend/external
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./frontend/external/.env.example
        required: true
      - path: ./frontend/external/.env
        required: false
    command: npm run dev -- --host
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      api-gateway:
        condition: service_started

  internal-frontend:
    build:
      context: ./frontend/internal
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./frontend/internal/.env.example
        required: true
      - path: ./frontend/internal/.env
        required: false
    command: npm run dev -- --host
    ports:
      - "${INTERNAL_FRONTEND_PORT:-5174}:5173"
    depends_on:
      api-gateway:
        condition: service_started

  superadmin-frontend:
    build:
      context: ./frontend/superadmin
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./frontend/superadmin/.env.example
        required: true
      - path: ./frontend/superadmin/.env
        required: false
    command: npm run dev -- --host
    ports:
      - "${SUPERADMIN_FRONTEND_PORT:-5175}:5173"
    depends_on:
      api-gateway:
        condition: service_started

volumes:
  identity_pgdata:
  car_pgdata:
  booking_pgdata:
  client_pgdata:
  ticket_pgdata:
  image_uploads:
  file_uploads:
