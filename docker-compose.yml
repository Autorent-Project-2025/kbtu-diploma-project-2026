          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - frontend

  superadmin-frontend:
    build:
      context: ./frontend/superadmin
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./frontend/superadmin/.env.example
        required: true
      - path: ./frontend/superadmin/.env
        required: false
    command: npm run dev -- --host
    ports:
      - "${SUPERADMIN_FRONTEND_PORT:-5175}:5173"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - frontend

volumes:
  identity_pgdata:
  car_pgdata:
  booking_pgdata:
  client_pgdata:
  partner_pgdata:
  payment_pgdata:
  ticket_pgdata:
  image_uploads:
  file_uploads:

networks:
  frontend:
  backend:
  data:
    internal: true
