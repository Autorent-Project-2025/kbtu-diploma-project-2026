    environment:
      FLYWAY_URL: jdbc:postgresql://ticket-db:5432/postgres_db
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres
      FLYWAY_CONNECT_RETRIES: 30
    networks:
