services:
  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-autorent}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-autorent}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-/}
    expose:
      - "5672"
      - "15672"
    ports:
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - backend

  identity-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres_db
    expose:
      - "5432"
    volumes:
      - identity_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres_db"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - data

  identity-flyway:
    image: flyway/flyway:12
    restart: "no"
    depends_on:
      identity-db:
        condition: service_healthy
    command: migrate
    volumes:
      - ./backend/shared/identity-service/src/Migrations:/flyway/sql:ro
    environment:
      FLYWAY_URL: jdbc:postgresql://identity-db:5432/postgres_db
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres
      FLYWAY_CONNECT_RETRIES: 30
    networks:
      - data

  identity-service:
    build:
      context: ./backend/shared/identity-service/src
      dockerfile: ./IdentityService.Api/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./backend/shared/identity-service/.env.example
        required: true
      - path: ./backend/shared/identity-service/.env
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DbConnection: Host=identity-db;Port=5432;Database=postgres_db;Username=postgres;Password=postgres
      InternalAuth__ApiKey: local-identity-service-key
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      Observability__LogPath: /tmp/autorent/identity-service/identity-service.jsonl
    expose:
      - "8080"
    depends_on:
      identity-db:
        condition: service_healthy
      identity-flyway:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend
      - data
    volumes:
      - identity_logs:/tmp/autorent/identity-service

  car-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres_db
    expose:
      - "5432"
    volumes:
      - car_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres_db"]
